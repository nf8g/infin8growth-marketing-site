<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Subscription Confirmed · Field Notes</title>
<meta name="description" content="You're now subscribed to Field Notes, the weekly newsletter from Infin8 Growth.">
<meta name="robots" content="noindex">
<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --deep-ocean: #0e2840;
    --gold: #ffb700;
    --seafoam: #4a9b8e;
    --text: #374151;
    --light-gray: #9ca3af;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Instrument Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #fafafa;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .container {
    max-width: 480px;
    background: white;
    padding: 48px 40px;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(14, 40, 64, 0.08);
    text-align: center;
  }
  .eyebrow {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--deep-ocean);
    margin-bottom: 16px;
  }
  h1 {
    font-family: 'Instrument Serif', Georgia, serif;
    font-size: 32px;
    font-weight: 400;
    color: var(--deep-ocean);
    margin-bottom: 8px;
  }
  .bar {
    width: 40px;
    height: 3px;
    background: var(--gold);
    margin: 20px auto;
  }
  p {
    font-size: 16px;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 16px;
  }
  .check {
    width: 64px;
    height: 64px;
    background: var(--seafoam);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
  }
  .check svg {
    width: 32px;
    height: 32px;
    stroke: white;
    stroke-width: 3;
    fill: none;
  }
  .btn {
    display: inline-block;
    background: var(--gold);
    color: var(--deep-ocean);
    font-weight: 600;
    font-size: 14px;
    padding: 14px 28px;
    border-radius: 8px;
    text-decoration: none;
    margin-top: 24px;
    transition: transform 0.15s ease;
  }
  .btn:hover {
    transform: translateY(-2px);
  }
</style>
</head>
<body>
<div class="container">
  <div class="check">
    <svg viewBox="0 0 24 24">
      <polyline points="20 6 9 17 4 12"></polyline>
    </svg>
  </div>
  <span class="eyebrow">Field Notes</span>
  <h1>You're in.</h1>
  <div class="bar"></div>
  <p>Thanks for confirming your subscription. You'll receive Field Notes in your inbox every week.</p>
  <p>Practical insights on building AI infrastructure for knowledge-based businesses. No hype, just what's working.</p>
  <a href="/" class="btn">Back to Infin8 Growth</a>
</div>
</body>
</html>
